                              - type: linebreak
                                version: 1
                              - mode: normal
                                text: >-
                                  Experience one of country’s newest and most
                                  promising stars live at The Event Center
                                  Saturday, March 28 at 7:30pm! At just 26,
                                  Pennsylvania native and Warner Records artist
                                  Warren Zeiders has made an undeniable mark on
                                  the genre, with 3.6+ billion global streams, 2
                                  billion TikTok views and 7.9 million monthly
                                  Spotify listeners. In 2024, he won a CMT Award
                                  for “Breakthrough Male Music Video of the
                                  Year,” received two People’s Choice Country
                                  nominations and earned his first No. 1 single
                                  with his RIAA Double Platinum-Certified
                                  “Pretty Little Poison” (2024’s second
                                  most-played song on country radio). Following
                                  TV appearances with Jimmy Fallon and Kelly
                                  Clarkson plus features in Forbes, GQ and more,
                                  he’s touring his 2025 album, Relapse, Lies &
                                  Betrayal with stops across the U.S., Australia
                                  and Europe.
                                type: text
                                style: ''
